<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
    <title>Calculator</title>
</head>
<body>
    <div class="container">
        <div class="view">
            <span class="view__expr"></span>
        </div>
        <div class="commands">
            <div class="column">
                <button class="btn" value="clear">AC</button>
                <button class="btn" value="÷">÷</button>
                <button class="btn" value="x">x</button>
                <button class="btn "value="remove"><i class="fa-solid fa-delete-left"></i></button>
            </div>
            <div class="column">
                <button class="btn" value="7">7</button>
                <button class="btn" value="8">8</button>
                <button class="btn" value="9">9</button>
                <button class="btn" value="-">-</button>
            </div>
            <div class="column">
                <button class="btn" value="4">4</button>
                <button class="btn" value="5">5</button>
                <button class="btn" value="6">6</button>
                <button class="btn" value="+">+</button>
            </div>
            <div class="column">
                <button class="btn" value="1">1</button>
                <button class="btn" value="2">2</button>
                <button class="btn" value="3">3</button>
                <button class="btn" value="rad">rad</button>
            </div>
            <div class="column">
                <button class="btn" value=".">.</button>
                <button class="btn" value="0">0</button>
                <button class="btn" value="%">%</button>
                <button class="btn special" value="=">=</button>
            </div>
        </div>
    </div>
</body>
</html>
